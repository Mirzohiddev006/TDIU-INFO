# Render.com Blueprint — TDIU Info Bot (bot + admin API + admin panel)
# Dashboard > New > Blueprint orqali shu repodan avtomatik o'qiladi.

databases:
  - name: tdiu-db
    plan: free
    databaseName: tdiu
    user: tdiu

services:
  # 1) Bot + Admin API (bitta servis — bepul tarifga sig'adi)
  - type: web
    name: tdiu-bot-api
    runtime: python
    plan: free
    region: frankfurt
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn backend.app.main:app --host 0.0.0.0 --port $PORT"
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.7"
      - key: DATABASE_URL
        fromDatabase:
          name: tdiu-db
          property: connectionString
      - key: BOT_TOKEN
        sync: false            # @BotFather tokeni — qo'lda kiritiladi
      - key: ADMIN_IDS
        sync: false            # operator/admin Telegram ID'lari
      - key: SUPPORT_USERNAME
        sync: false
      - key: JWT_SECRET
        generateValue: true    # avtomatik xavfsiz kalit
      - key: ADMIN_USERNAME
        value: "admin"
      - key: ADMIN_PASSWORD
        sync: false            # admin panel paroli — qo'lda kiriting!
      - key: ADMISSION_YEAR
        value: "2025/2026"
      - key: KEEPALIVE_MINUTES
        value: "14"
      - key: SUBSCRIPTION_CHECK
        value: "true"          # majburiy obuna; bot 3 kanalda ADMIN bo'lishi shart

  # 2) Admin panel (React static site — bepul)
  - type: web
    name: tdiu-admin
    runtime: static
    buildCommand: "cd admin && npm install && npm run build"
    staticPublishPath: admin/dist
    envVars:
      - key: VITE_API_URL
        sync: false            # tdiu-bot-api manzili + /api (1-deploydan keyin kiriting)
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
