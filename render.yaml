# Render.com Blueprint — TDIU Info Bot (bot + admin API + admin panel)
# Dashboard > New > Blueprint orqali shu repodan avtomatik o'qiladi.
#
# MUHIM: Render bepul tarifda akkauntda faqat BITTA bepul Postgres bo'lishi mumkin.
# Sizda allaqachon bitta bepul baza bor (currency), shuning uchun bu yerda yangi
# baza YARATMAYMIZ. TDIU uchun bepul Neon (https://neon.tech) bazasini oching va
# uning connection string'ini Render Dashboard'da DATABASE_URL ga qo'ying.

services:
  # 1) Bot + Admin API (bitta servis — bepul tarifga sig'adi)
  - type: web
    name: tdiu-bot-api
    runtime: python
    plan: free
    region: frankfurt
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn backend.app.main:app --host 0.0.0.0 --port $PORT"
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.7"
      # Neon (yoki boshqa) Postgres connection string'ini Render Dashboard'da
      # qo'lda kiriting. sync:false => maxfiy, repoga tushmaydi.
      - key: DATABASE_URL
        sync: false
      - key: BOT_TOKEN
        sync: false
      - key: ADMIN_IDS
        sync: false
      - key: SUPPORT_USERNAME
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_USERNAME
        value: "admin"
      - key: ADMIN_PASSWORD
        value: "admin123"      # super-admin paroli — keyin o'zgartiring
      - key: ADMISSION_YEAR
        value: "2025/2026"
      - key: KEEPALIVE_MINUTES
        value: "14"
      - key: SUBSCRIPTION_CHECK
        value: "true"

  # 2) Admin panel (oldindan build qilingan static — npm build YO'Q)
  # API manzili admin/dist/config.js da runtime'da beriladi.
  - type: web
    name: tdiu-admin
    runtime: static
    buildCommand: "echo 'prebuilt dist ishlatilmoqda'"
    staticPublishPath: admin/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
